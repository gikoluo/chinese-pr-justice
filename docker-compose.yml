version: "3.9"

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: dev
    ports:
      - "4321:4321"
    volumes:
      - .:/app
      - /app/node_modules
    environment:
      NODE_ENV: development
    command: ["npm", "run", "dev", "--", "--host", "0.0.0.0", "--port", "4321"]

